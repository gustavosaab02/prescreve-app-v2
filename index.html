<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prescreve. — App Completo</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sage: #4a7c6f;
  --sage-light: #6a9e8f;
  --sage-pale: #e8f2ef;
  --sage-dark: #2d5a50;
  --dark: #0e1a16;
  --cream: #faf8f4;
  --white: #ffffff;
  --charcoal: #1a1a1a;
  --mid: #5a5a5a;
  --light: #9a9a9a;
  --border: #e8e4df;
  --accent: #c17f3e;
  --accent-light: #f5e8d6;
  --red: #e05555;
  --red-light: #fdeaea;
  --blue: #4a7ab5;
  --blue-light: #e8f0f9;
  --green: #2d7a47;
  --green-light: #d4edda;
  --warn: #d4820a;
  --warn-light: #fef3dc;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 20px 100px;
}

/* TOP BAR */
.topbar {
  width: 100%;
  max-width: 1020px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.logo {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  color: white;
}
.logo span { color: var(--accent); }

.v2-badge {
  background: linear-gradient(135deg, var(--sage) 0%, var(--sage-light) 100%);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 100px;
  letter-spacing: 1px;
}

/* SECTION TOGGLE */
.section-toggle {
  display: flex;
  gap: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 4px;
}

.toggle-btn {
  padding: 7px 18px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.4);
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.toggle-btn.active { background: var(--sage); color: white; }

/* PROGRESS */
.progress-wrap {
  width: 100%;
  max-width: 1020px;
  margin-bottom: 24px;
}

.steps {
  display: flex;
  position: relative;
}

.steps::before {
  content: '';
  position: absolute;
  top: 13px;
  left: 13px;
  right: 13px;
  height: 1px;
  background: rgba(255,255,255,0.08);
  z-index: 0;
}

.step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  position: relative;
  z-index: 1;
}

.step-dot {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.3);
  transition: all 0.2s;
}

.step.active .step-dot { background: var(--sage); border-color: var(--sage); color: white; }
.step.done .step-dot { background: rgba(74,124,111,0.2); border-color: var(--sage); color: var(--sage-light); }

.step-label {
  font-size: 8px;
  font-weight: 600;
  color: rgba(255,255,255,0.2);
  text-align: center;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  line-height: 1.3;
}

.step.active .step-label, .step.done .step-label { color: var(--sage-light); }

/* SCREEN */
.screen-wrap { width: 100%; max-width: 1020px; }
.screen { display: none; }
.screen.active { display: flex; gap: 44px; align-items: flex-start; justify-content: center; }

/* PHONE — App Native Style */
.phone {
  width: 300px;
  min-height: 600px;
  background: var(--charcoal);
  border-radius: 44px;
  border: 8px solid #0a0a0a;
  box-shadow: 0 32px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}

.phone-notch {
  width: 100px;
  height: 26px;
  background: #0a0a0a;
  border-radius: 0 0 18px 18px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.notch-camera { width: 8px; height: 8px; background: #1a1a1a; border-radius: 50%; border: 1.5px solid #222; }

.phone-scroll {
  padding: 14px 18px 28px;
  overflow-y: auto;
  max-height: 570px;
}

/* Info panel */
.info-panel { max-width: 240px; flex-shrink: 0; }

.screen-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--sage-light);
  margin-bottom: 10px;
}

.screen-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: white;
  line-height: 1.2;
  margin-bottom: 10px;
}

.screen-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  line-height: 1.7;
  margin-bottom: 18px;
}

.feat-list { list-style: none; }
.feat-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.35);
  padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  line-height: 1.5;
}
.feat-item:last-child { border-bottom: none; }
.feat-check {
  width: 15px; height: 15px;
  background: rgba(74,124,111,0.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  color: var(--sage-light);
  flex-shrink: 0;
  margin-top: 1px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(14,26,22,0.95);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px;
  padding: 10px 18px;
  z-index: 100;
}

.nav-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-size: 16px;
  padding: 4px 8px;
  font-family: 'DM Sans', sans-serif;
  transition: color 0.2s;
}
.nav-btn:hover { color: white; }

.nav-dots { display: flex; gap: 5px; }
.ndot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; transition: all 0.2s; }
.ndot.active { background: var(--sage-light); width: 18px; border-radius: 3px; }

.nav-count { font-size: 11px; color: rgba(255,255,255,0.2); min-width: 30px; text-align: center; }

/* ===== PHONE DARK COMPONENTS ===== */
.ph-status-bar {
  display: flex;
  justify-content: space-between;
  padding: 4px 0 8px;
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

.ph-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.ph-logo { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; color: white; }
.ph-logo span { color: var(--accent); }

.ph-back { font-size: 18px; color: rgba(255,255,255,0.5); }

.ph-avatar {
  width: 30px; height: 30px;
  background: var(--sage-pale);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}

.ph-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 400;
  color: white;
  line-height: 1.2;
  margin-bottom: 3px;
}

.ph-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-bottom: 14px; }

.section-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 8px;
}

/* SPLASH */
.splash {
  background: var(--sage-dark);
  margin: -14px -18px;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.splash::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 60%, rgba(106,158,143,0.3) 0%, transparent 70%);
}

.splash-logo {
  font-family: 'Fraunces', serif;
  font-size: 52px;
  font-weight: 700;
  color: white;
  letter-spacing: -2px;
  position: relative;
  z-index: 2;
}
.splash-logo span { color: var(--accent); }
.splash-sub { font-size: 12px; color: rgba(255,255,255,0.5); position: relative; z-index: 2; margin-top: 4px; }

/* ONBOARDING */
.onboard-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
}
.onboard-dot { height: 3px; flex: 1; background: rgba(255,255,255,0.1); border-radius: 2px; }
.onboard-dot.active { background: var(--sage-light); }

.ph-card {
  background: rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.08);
}

.ph-card-name { font-size: 13px; font-weight: 600; color: white; margin-bottom: 2px; }
.ph-card-detail { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.4; }

.ph-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 11px 12px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: white;
}
.ph-input.active { border-color: var(--sage-light); }
.ph-input::placeholder { color: rgba(255,255,255,0.2); }

.input-group { margin-bottom: 10px; }
.input-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }

.ph-btn {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  margin-top: 8px;
}
.ph-btn-primary { background: var(--sage); color: white; }
.ph-btn-secondary { background: rgba(74,124,111,0.2); color: var(--sage-light); border: 1px solid rgba(74,124,111,0.3); }
.ph-btn-ghost { background: transparent; color: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.08); }
.ph-btn-accent { background: var(--accent); color: white; }

.ph-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 12px 0; }

/* STATS */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }

.stat-card {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.06);
}

.stat-num {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--sage-light);
  line-height: 1;
  margin-bottom: 2px;
}
.stat-label { font-size: 10px; color: rgba(255,255,255,0.3); }

/* BADGES */
.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 100px;
  letter-spacing: 0.3px;
}
.badge-green { background: rgba(45,122,71,0.2); color: #5dc98a; }
.badge-orange { background: rgba(193,127,62,0.2); color: var(--accent); }
.badge-blue { background: rgba(74,122,181,0.2); color: #7aaee8; }
.badge-warn { background: rgba(212,130,10,0.2); color: #f5a623; }
.badge-sage { background: rgba(74,124,111,0.2); color: var(--sage-light); }
.badge-red { background: rgba(224,85,85,0.15); color: #ff8080; }

/* HISTORY ITEM */
.hist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.hist-item:last-child { border-bottom: none; }
.hist-icon { width: 34px; height: 34px; background: rgba(74,124,111,0.15); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.hist-name { font-size: 12px; font-weight: 600; color: white; margin-bottom: 2px; }
.hist-detail { font-size: 10px; color: rgba(255,255,255,0.3); }

/* AUTOCOMPLETE */
.ac-wrap { position: relative; margin-bottom: 10px; }
.ac-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid var(--sage);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--sage-light);
  display: flex;
  align-items: center;
  gap: 7px;
}
.ac-dropdown {
  background: #1a2920;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
  margin-top: 4px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.3);
}
.ac-item {
  padding: 9px 12px;
  font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
}
.ac-item:last-child { border-bottom: none; }
.ac-item.sel { background: rgba(74,124,111,0.15); }
.ac-name { font-weight: 600; color: var(--sage-light); margin-bottom: 1px; }
.ac-detail { color: rgba(255,255,255,0.3); font-size: 10px; }

/* PRODUCT SELECTED */
.product-sel {
  background: rgba(74,124,111,0.15);
  border: 1.5px solid var(--sage);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 10px;
}
.product-sel-name { font-size: 12px; font-weight: 600; color: var(--sage-light); margin-bottom: 1px; }
.product-sel-detail { font-size: 10px; color: rgba(255,255,255,0.3); }

/* OPTION CARDS */
.option-card {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  border: 1.5px solid rgba(255,255,255,0.07);
  display: flex;
  align-items: center;
  gap: 10px;
}
.option-card.rec { border-color: var(--sage); background: rgba(74,124,111,0.1); }
.option-img { width: 40px; height: 40px; background: rgba(255,255,255,0.06); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.option-name { font-size: 11px; font-weight: 600; color: white; margin-bottom: 1px; }
.option-brand { font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
.option-price { font-size: 13px; font-weight: 700; color: var(--sage-light); }

/* PROGRESS BAR */
.pb-label { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.3); margin-bottom: 5px; }
.pb-track { height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
.pb-fill { height: 100%; background: linear-gradient(90deg, var(--sage) 0%, var(--sage-light) 100%); border-radius: 3px; }

/* SCAN SCREEN */
.scan-area {
  background: #000;
  border-radius: 16px;
  margin-bottom: 14px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(74,124,111,0.5);
}

.scan-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(transparent 30%, rgba(0,0,0,0.5) 30%),
    linear-gradient(rgba(0,0,0,0.5) 70%, transparent 70%);
}

.scan-frame {
  width: 160px;
  height: 120px;
  position: relative;
  z-index: 2;
}

.scan-corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--sage-light);
  border-style: solid;
}
.sc-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
.sc-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
.sc-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
.sc-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--sage-light);
  top: 40%;
  z-index: 3;
  box-shadow: 0 0 8px var(--sage-light);
}

/* NOTIFICATION */
.notif-banner {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  backdrop-filter: blur(10px);
}
.notif-icon { font-size: 18px; flex-shrink: 0; }
.notif-app { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; margin-bottom: 2px; }
.notif-text { font-size: 11px; color: white; line-height: 1.4; }
.notif-time { font-size: 9px; color: rgba(255,255,255,0.3); margin-left: auto; flex-shrink: 0; }

/* WHY */
.why-option {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.why-option.sel { border-color: var(--sage); background: rgba(74,124,111,0.1); }
.why-icon { font-size: 18px; }
.why-text { font-size: 12px; font-weight: 500; color: white; }
.why-sub { font-size: 10px; color: rgba(255,255,255,0.3); }

/* REORDER BANNER */
.reorder-banner {
  background: linear-gradient(135deg, var(--sage-dark) 0%, var(--sage) 100%);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}
.reorder-title { font-size: 13px; font-weight: 700; color: white; margin-bottom: 3px; }
.reorder-sub { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 10px; line-height: 1.4; }
.reorder-btn { background: white; color: var(--sage); padding: 7px 14px; border-radius: 100px; font-size: 11px; font-weight: 700; display: inline-block; }

/* CONFIRM ROW */
.confirm-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 11px; }
.cr-label { color: rgba(255,255,255,0.3); }
.cr-value { color: white; font-weight: 500; text-align: right; max-width: 55%; }

/* ANALYTICS */
.anal-card {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.06);
}

/* TAG */
.tag { display: inline-block; font-size: 9px; padding: 3px 8px; border-radius: 100px; font-weight: 600; margin-right: 4px; }
.tag-sage { background: rgba(74,124,111,0.2); color: var(--sage-light); }
.tag-accent { background: rgba(193,127,62,0.15); color: var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">prescreve<span>.</span></div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="v2-badge">APP · VERSÃO 2</span>
    <div class="section-toggle" id="sectionToggle">
      <button class="toggle-btn active" onclick="setSection('onboard')">Onboarding</button>
      <button class="toggle-btn" onclick="setSection('medico')">Médico</button>
      <button class="toggle-btn" onclick="setSection('paciente')">Paciente</button>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="steps" id="stepsEl"></div>
</div>

<div class="screen-wrap" id="screenWrap"></div>

<div class="nav">
  <button class="nav-btn" onclick="prev()">←</button>
  <div class="nav-dots" id="navDots"></div>
  <span class="nav-count" id="navCount">1/16</span>
  <button class="nav-btn" onclick="next()">→</button>
</div>

<script>
const allScreens = {
  onboard: [
    {
      tag: 'ONBOARDING · TELA 1',
      title: 'Splash screen',
      desc: 'Primeira tela ao abrir o app. Marca forte, posicionamento claro.',
      feats: ['Animação de entrada suave','Logo centralizado','Carregamento de dados em background','Detecta se é primeira vez ou usuário existente'],
      render: () => `
        <div class="splash">
          <div class="splash-logo">prescreve<span>.</span></div>
          <div class="splash-sub">do consultório ao tratamento</div>
        </div>`

    b.classList.toggle('active', ['onboard','medico','paciente'][i] === s);
  });
  render();
}

  const screens = getScreens();
  const s = screens[idx];

  document.getElementById('stepsEl').innerHTML = screens.map((sc,i) => `
    <div class="step ${i===idx?'active':i<idx?'done':''}" onclick="goTo(${i})">
      <div class="step-dot">${i<idx?'✓':i+1}</div>
      <div class="step-label">${sc.tag.replace(' · ','\n')}</div>
    </div>`).join('');

  document.getElementById('navDots').innerHTML = screens.map((_,i) =>
    `<div class="ndot ${i===idx?'active':''}" onclick="goTo(${i})"></div>`).join('');

  document.getElementById('navCount').textContent = `${idx+1}/${screens.length}`;

  const wrap = document.getElementById('screenWrap');
  const mockup = `
    <div class="phone">
      <div class="phone-notch">
        <div class="notch-camera"></div>
        <div style="width:32px;height:6px;background:#1a1a1a;border-radius:3px;"></div>
        <div class="notch-camera"></div>
      </div>
      ${s.render()}
    </div>`;

  wrap.innerHTML = `
    <div class="screen active">
      ${mockup}
      <div class="info-panel">
        <div class="screen-tag">${s.tag}</div>
        <div class="screen-title">${s.title}</div>
        <div class="screen-desc">${s.desc}</div>
        <ul class="feat-list">${s.feats.map(f=>`<li class="feat-item"><div class="feat-check">✓</div>${f}</li>`).join('')}</ul>
      </div>
    </div>`;
}

function goTo(i) { idx = i; render(); }
function next() { const s = getScreens(); if(idx < s.length-1) { idx++; render(); } }
function prev() { if(idx > 0) { idx--; render(); } }

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
});

render();
</script>
</body>
</html>
